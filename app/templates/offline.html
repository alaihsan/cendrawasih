{% extends "base.html" %}

{% block title %}Offline - Cendrawasih{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center text-center px-4">
    <div class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mb-6 text-slate-400">
        <i class="fas fa-wifi-slash text-4xl"></i>
    </div>
    <h1 class="text-3xl font-bold text-slate-900 mb-2">Anda Sedang Offline</h1>
    <p class="text-slate-600 max-w-md mb-8">
        Koneksi internet terputus. Namun, Anda tetap bisa mengakses kursus dan halaman yang sudah pernah Anda buka sebelumnya.
    </p>
    <div class="flex gap-4">
        <a href="{{ url_for('main.dashboard') }}" class="px-6 py-2 bg-emerald-600 text-white rounded-lg font-bold hover:bg-emerald-700 transition">
            Buka Dashboard
        </a>
        <button onclick="window.location.reload()" class="px-6 py-2 bg-slate-100 text-slate-700 rounded-lg font-bold hover:bg-slate-200 transition">
            Coba Lagi
        </button>
    </div>
</div>
{% endblock %}
